{% extends 'myapp/base.html' %}
<!-- Comment -->
{% block body %}

<h1>This is a checkout page</h1>
<form action="">
  <h1>Complete your order</h1>
  <p>Please recheck your address on which the items would be shipped</p>
  <label for="">Full Name</label>
  <input type="text" value="{{ address.full_name }}" name="" id="" />
  <div>
    <label for="">Phone</label>
    <input type="text" value="{{ address.phone }}" name="" id="" />
  </div>
  {% if address.phone_alt %}
  <div>
    <label for="">Alternative Phone</label>
    <input type="text" value="{{ address.phone_alt }}" name="" id="" />
  </div>
  {% endif %}
  <div>
    <label for="">Delivery Details</label>
    <input type="text" value="{{ address.delivery_details }}" name="" id="" />
  </div>
  <div>
    <label for="">City / Town</label>
    <input type="text" value="{{ address.city }}" name="" id="" />
  </div>
  <div>
    <label for="">County</label>
    <input type="text" value="{{ address.county }}" name="" id="" />
  </div>
  <div>
    <label for="">Postal Code</label>
    <input type="text" value="{{ address.postal_code }}" name="" id="" />
  </div>
  <div>
    <label for="">Country</label>
    <input type="text" value="{{ address.country }}" name="" id="" />
  </div>
  <button type="submit">Complete Order</button>
</form>
<!-- Created a jquery so that I am able to see what happens when you click the complete order button  -->
<!-- we will handle a submit event in our form -->
<script>
  $(document).on("submit", function (e) {
    e.preventDefault();
    $.ajax({
      type: "POST",
      url: "{% url 'place-order' %}",
      data: {
        csrfmiddlewaretoken: "{{csrf_token}}",
        action: "post",
      },
      // if everything went well we want to be redirected;
      // json.success is false when the server refused (e.g. empty cart)
      success: function (json) {
        if (json.success) {
          window.location.replace("{% url 'order-success' %}");
        } else {
          window.location.replace("{% url 'cart-overview' %}");
        }
      },
      error: function () {
        window.location.replace("{% url 'order-failed' %}");
      },
    });
  });
</script>
{% endblock %}
